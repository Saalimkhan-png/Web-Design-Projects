<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Student Registration Form</title>
</head>
<body>
<form style="background-color:skyblue ; color: whitesmoke;">

					<h1 align="center"> <font color="black">Student Registration Form</font> </h1>
	<table>

		<tr>
			<td>
				<font color="black">First Name:</font>
			</td>
		</tr>

		<tr>
			<td>
				<input type="text" name="name" placeholder="Firstname" size="50%">
			</td>
		</tr>

		<tr>
			<td>
				<font color="black">Middle Name:</font>
			</td>
		</tr>

		<tr>
			<td>
				<input type="text" name="name" placeholder="Middlename" size="50%">
			</td>
		</tr>

		<tr>
			<td>
				<font color="black">Last Name:</font>
			</td>
		</tr>

		<tr>
			<td>
				<input type="text" name="name" placeholder="Lastname" size="50%">
			</td>
		</tr>

		<tr>
			<td>
				<font color="black">Courses:</font>
		
				<select>
					<option>Course</option>
					<option>HTML</option>
					<option>CSS</option>
				</select>
			</td>
		</tr>

		<tr>
			<font color="black"> Gender:</font>
		</tr>

		<tr>
			<td>
				<input type="radio" name=""> <font color="black">Male</font>
				<input type="radio" name=""><font color="black">Female</font>
				<input type="radio" name=""><font color="black">Others</font>
			</td>
		</tr>

		<tr>
			<td>
				<font color="black">Phone:</font>
			</td>
		</tr>

		<tr>
			<td>
				<input type="text" name="name" placeholder="+92" size="50%">
			</td>
		</tr>
		<tr>
			<td>
				<input type="text" name="" placeholder="phone no." size="50%">
			</td>
		</tr>

		<tr>
			<td>
				<font color="black">Current Address:</font>
			</td>
		</tr>

		<tr>
			<td>
				<textarea cols="50" rows="9"></textarea>
			</td>
		</tr>

		<tr>
			<td>
				<font color="black">Email:</font>
			</td>
		</tr>

		<tr>
			<td>
				<input type="text" name="name" placeholder="Enter Email" size="50%">
			</td>
		</tr>

		<tr>
			<td>
				<font color="black">Password:</font>
			</td>
		</tr>

		<tr>
			<td>
				<input type="Password" name="name" placeholder="Enter Password" size="50%">
			</td>
		</tr>

		<tr>
			<td>
				<font color="black">Re-type Password:</font>
			</td>
		</tr>

		<tr>
			<td>
				<input type="Password" name="name" placeholder="Retype Password" size="50%">
			</td>
		</tr>




		<tr>
			<td>
				<input type="button" name="" value="Register" style="color:darkgreen;">
			</td>
		</tr>


















	
	</table>				
	
</form>					
</body>
</html>
