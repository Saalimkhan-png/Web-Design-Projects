<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>divs</title>
	<style>
		.box1{
			width: 95vw;
			height: 31vh;
			border: 5px solid black;
			background: green;

		}
		.box2{
			width: 12vw;
			height: 38vh;
			border: 5px solid black;
			background-color:darkred ;
			margin-top:2vh ;
			margin-left:40vw ;
		}
		.box3{
			width: 95vw;
			height: 17vh;
			border: 5px solid black;
			background-color: blue;
			margin-top: 2vh;
		}
		.radius1{
			width: 9vw;
			height: 18vh;
			border: 5px solid black;
			background-color:darkred ;
			border-radius:90%;
			margin-top: 4vh;
			margin-left: 80vw;
		}
		.radius2{
			width: 5vw;
			height: 10vh;
			border: 5px solid black;
			background-color: green;
			border-radius: 90%;
			margin-top: 24vh;
			margin-left: 6vw;
		}
		.radius3{
			width: 7vw;
			height: 14vh;
			border: 5px solid black;
			background-color: lightpink;
			border-radius: 90%;
			margin-top:1vh ;
			margin-left:30vw ;
		}

	</style>
</head>
<body>
<div class="box1">
	<div class="radius1"></div>
</div>
<div class="box2">
	<div class="radius2"></div>
</div>
<div class="box3">
	<div class="radius3"></div>
</div>
</body>
</html>
