<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Student Registration Form</title>
</head>
<body>
<form style="background-color:lightskyblue ;color:ghostwhite ;">
							<h1 align="center">Student Registration Form</h1>
	<table>
		<tr>
			<td>Name:</td>

			<td>
				<input type="text" name="name" placeholder="Enter name">
			</td>
		</tr>


		<tr>
			<td>Father Name:</td>

			<td>
				<input type="text" name="name" placeholder="Enetr name">
			</td>
		</tr>

		<tr>
			<td>Postal Address</td>

			<td>
				<input type="text" name="Address" placeholder="Enetr Address">
			</td>
		</tr>

		<tr>
			<td>Personal Address</td>
			<td>
				<input type="text" name="address" placeholder="Enter Address">
			</td>
		</tr>

		<tr>
			<td>Sex</td>
			<td>
				<input type="checkbox" name="male"> Male
			

				<input type="checkbox" name="female">Female
			</td>
		</tr>

		<tr>
			<td>City:</td>

			<td>
			<select>
				<option>Select</option>
				<option>Rawalpindi</option>
				<option>Lahore</option>
			</select>
			</td>
		</tr>

		<tr>
			<td>Course:</td>

			<td>
			<select>
				<option>Select</option>
				<option>HTML</option>
				<option>CSS</option>
			</select>
			</td>
		</tr>

		<tr>
			<td>District:</td>

			<td>
			<select>
				<option>Select</option>
				<option>Hangu</option>
				<option>Kohat</option>
			</select>
			</td>
		</tr>

		<tr>
			<td>state:</td>

			<td>
			<select>
				<option>Select</option>
				<option>Panjab</option>
				<option>Sindh</option>
			</select>
			</td>
		</tr>

		<tr>
			<td>PinCode:</td>

			<td>
				<input type="password" name="pincode" placeholder="Enter pincode">
			</td>
		</tr>

		<tr>
			<td>Email ID:</td>

			<td>
				<input type="text" name="Email" placeholder="abc@.com">
			</td>
		</tr>

		<tr>
			<td>DOB:</td>
			<td>
				<input type="text" name="dob" placeholder="Enter DOB">
			</td>
		</tr>

		<tr>
			<td>Mobile Number:</td>

			<td>
				<input type="text" name="number" placeholder="Enter Number">
			</td>
		</tr>

		<tr>
			<td>
				<input type="reset" name="btn1" value="Reset">
			</td>

			<td>
				<input type="submit" name="btn2" value="Submit Form">
			</td>



		</tr>













































	</table>
</form>
</body>
</html>
