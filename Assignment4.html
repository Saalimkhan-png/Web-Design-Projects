<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Student Form</title>
</head>
<body>
<form style= "">
	<h1 align="center">Student Form</h1>
	<table>
		<tr>
			<td>Name:</td>

			<td>
				<input  type="text" name="" placeholder="First Name" style="border-color: skyblue ;">
			
			
				<input type="text" name="" placeholder="Middle Name" style="border-color: skyblue ;">
			
			
				<input type="text" name="" placeholder="Last Name"style="border-color: skyblue ;">

			</td>
		</tr>

		<tr>
			<td>Email:</td>

			<td>
				<input  type="text" name="Email" placeholder="abc@.com"style="border-color: skyblue ;">
			</td>
		</tr>

		<tr>
			<td>Password:</td>
			<td>
				<input type="Password" name="" placeholder="Password"style="border-color: skyblue ;">
			</td>
		</tr>	
		<tr>	
			<td>Confirm Password:</td>
			<td>
				<input type="Password" name="" placeholder="Confirm Password"style="border-color: skyblue ;">
			</td>
		</tr>	

		<tr>
			<td>Address:</td>
			<td>	
			<textarea rows="7" cols="40" ></textarea style="border-color: skyblue ;">
			</td>
		</tr>

		<tr>
			<td>College Name:</td>

			<td>
				<input type="text" name="college name" placeholder="College Name" style="border-color: skyblue ;">
			</td>
		</tr>
			
		<tr>
			<td>Mobile Number:</td>
			<td>
				
				<input type="text" name="" placeholder="+91" size="1" style="border-color: skyblue ;">
				<input type="text" name="" placeholder="10 Digit Number" style="border-color: skyblue ;">
			</td>
		</tr>

		<tr>
			<td>Gender:</td>

			<td>
				<select style="border-color: skyblue ;">
					<option>Male</option style="border-color: skyblue ;">
					<option>Female</option style="border-color: skyblue ;">
				</select>
			</td>
		</tr>

		<tr>
			<td>City:</td>
			<td>
				<input type="text" name="" placeholder="City" style="border-color: skyblue ;">
			</td>
		</tr>

		<tr>
			<td>State:</td>

			<td>
				<input type="text" name="State" placeholder="State" style="border-color: skyblue ;">
			</td>
		</tr>

		<tr>
			<td>Country:</td>

			<td>
				<input type="text" name="Country" placeholder="Country" style="border-color: skyblue ;">
			</td>
		</tr>

		<tr>
			<td>Hobbies:</td>
			<td>
			Music	<input type="radio" name="" style="border-color: skyblue ;">
			Sports	<input type="radio" name="" style="border-color: skyblue ;">
			Games	<input type="radio" name="" style="border-color: skyblue ;">
			Others	<input type="radio" name="">
			</td>
		</tr>
<p>
		<tr>
			<td>
				<input type="Button" name="" value="Submit" align="Center">
			</td>
		</tr>
<p>









	</table>
</form>
</body>
</html>
