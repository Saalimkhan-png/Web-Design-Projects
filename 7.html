<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>divs</title>
	<style>
		.box{
			width: 95vw;
			height: 95vh;
			border: 5px solid black;
		}
		.box1{
			width: 11vw;
			height: 11vh;
			border: 5px solid black;
			background-color:green ;
			margin-left: 1vw;
			margin-top: 2vh;
		}
		.box2{
			width: 79vw;
			height: 12vh;
			background-color:black ;
			border: 5px solid black;
			margin-left: 14vw;
			margin-top: -13vh;
		}

		.box3{
			width: 17vw;
			height: 58vh;
			border: 5px solid black;
			background-color: blue;
			border-radius:8%;
			margin-left: 1vw;
			margin-top: 15vh;
		}
		.boxx{
			width: 60vw;
			height: 9vh;
			margin-top: -75vh;
			margin-left: 30vw;
			display: flex;
		}
		.about{
			margin-left:7vw ;
		}
		.contact{
			margin-left: 7vw;
		}

		.home1{
			margin-left: 21vw;
			margin-top: 5vh ;
		}


	</style>
</head>
<body>
<div class="box">
	<div class="box1"></div>
	<div class="box2"></div>
	<div class="box3"></div>
	<div class="boxx">
	<h1><div class="home">Home</div></h1>
	<h1><div class="about">About</div></h1>
	<h1><div class="contact">Contact</div></h1>
	</div>
	<h1><div class="home1">Home</div> </h1>
</div>
</body>
</html>
