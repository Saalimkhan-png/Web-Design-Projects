<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Form</title>
</head>
<body>
<form style="background-color:skyblue;color: white;">
	<table>
		<tr>
			<td>
		First Name:		
			</td>
	
			<td>
				
			<input type="text" name="Name" value="" placeholder="Enter Name">	
			</td>
		</tr>
<br>
		<tr>
			<td>
			Middle Name:	
			</td>

			<td>
			<input type="text" name="name" placeholder="Enter Name">	
			</td>

		</tr>
<br>
		<tr>
			<td>
			Last Name:	
			</td>

			<td>
			<input type="text" name="name" placeholder="Enter Name">	
			</td>

		</tr>


		<tr>
			<td>
			Course:	
			</td>
		<td>
		<select name="courses">
			<option>Course</option>
			<option>HTML</option>
			<option>CSS</option>
			<option>JS</option>
		</select>	
		</td>

		</tr>


		<tr>
			<td>
			Gender:	
			</td>
		</tr>

		<tr>
			<td>
				<input type="radio" name="male" value="1" > Male
				<br>
				<input type="radio" name="female" value="2"> Female
				<br>
				<input type="radio" name="other" value="3"> Others
			</td>
		</tr>

		<tr>
			<td>
			Phone:	
			</td>

			<td>
				<input type="text" name="Phone" placeholder="91+">
			</td>
		</tr>


		<tr>
			<td>
				Address
			</td>
		</tr>
	</table>
	<table>


		<tr>
			<td>
				<textarea rows="10" cols="60" ></textarea>
			</td>
		</tr>
	</table>
	
	<table>	

			<tr>
			<td>
		Email:		
			</td>
	
			<td>
				
			<input type="text" name="Email" value="" placeholder="...@gmail.com">	
			</td>
		</tr>


			<tr>
			<td>
		Password:		
			</td>
	
			<td>
				
			<input type="Password" name="Password" value="" placeholder="Enter Password">	
			</td>
		</tr>


			<tr>
			<td>
		Re-type password:		
			</td>
	
			<td>
				
			<input type="Password" name="Password" value="" placeholder="Enter Password">	
			</td>
		</tr>
	<tr>
		<td>	
		<input type="button" name="btn1" value="Submit">
		</td>
	</tr>		
















	</table>
</form>
</body>
</html>
